version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      expo-and-react-native:
        patterns:
          - expo*
          - react-native*
          - "@expo/*"
      test-and-tooling:
        patterns:
          - eslint*
          - typescript
          - tsx
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
