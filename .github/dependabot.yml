version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      test-and-tooling:
        patterns:
          - eslint*
          - typescript
          - tsx
    ignore:
      # Expo-managed runtime packages must be upgraded together through an Expo SDK review.
      - dependency-name: expo
      - dependency-name: expo-*
      - dependency-name: "@expo/*"
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: react-native
      - dependency-name: react-native-*
      - dependency-name: "@react-native-async-storage/async-storage"
      # Tooling major versions can require config migration; handle them intentionally.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: eslint-config-expo
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
